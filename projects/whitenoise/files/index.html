<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ-Oli Noise Machine</title>
  <link rel="icon" href="/files/favicon.ico">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 30px;
      margin: 20px;
    }
    .button {
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      font-size: 50px;
      cursor: pointer;
      border-radius: 8px;
      width: 100%;
    }
    .button:active { opacity: 0.7; }
    .green { background-color: #4CAF50; }
    .cyan { background-color: #03dffc; }
    .gray { background-color: #BBBBBB; }
    table { width: 100%; }
    td { padding: 4px; }
  </style>
</head>

<body>
<h1>DJ Olicat's Noise Machine</h1>

<br>
<span id="status"></span>

<table>
  <tr>
    <td><button class="button green" onclick="callAPI('/vol/off')">Off</button></td>
    <td><button class="button green" onclick="callAPI('/vol/less')">Down</button></td>
    <td><button class="button green" onclick="callAPI('/vol/more')">Up</button></td>
    <td><button class="button green" onclick="callAPI('/vol/max')">Max</button></td>
  </tr>
  <tr>
    <td><button class="button cyan" onclick="callAPI('/vol/rampoff')">Ramp-Off</button></td>
    <td><button class="button cyan" onclick="callAPI('/vol/rampdown')">Ramp-Down</button></td>
    <td><button class="button cyan" onclick="callAPI('/vol/rampup')">Ramp-Up</button></td>
    <td><button class="button cyan" onclick="callAPI('/vol/rampmax')">Ramp-Max</button></td>
  </tr>
  <tr></tr>
  <tr>
    <td><button class="button gray" onclick="callAPI('/vol/unset')">Unset Boost</button></td>
    <td><button class="button gray" onclick="callAPI('/reset')">Reset</button></td>
    <td><button class="button gray" onclick="callAPI('/shush')">Shush</button></td>
  </tr>
</table>

<span id="api_resp"></span>

<script>
function callAPI(route) {
  console.log('callAPI ' + route);
  fetch(route).then(resp => {return resp.json()}).then(body => {
    console.log(body)
    document.getElementById("api_resp").innerHTML = JSON.stringify(body);
    pollStatus();
    setTimeout( function() {
         document.getElementById("api_resp").innerHTML = "";
    }, 5000);
  });
}

lastResp = null;

function pollStatus() {
  console.log("polling status");
  fetch('/status').then(resp => {return resp.json()}).then(body => {
    var html = "Time: " + body['now'] + '<br>Debug: ' + body['debug'] + '<br>Volume: ' + body['vol'];
    if (body['shush_remaining_minutes'] > 0) {
      html += '<br><strong>Shush active: ' + body['shush_remaining_minutes'] + ' minutes remaining</strong>';
    }
    document.getElementById("status").innerHTML = html;
  });
}

pollStatus();
var intervalId = setInterval(pollStatus, 10000);
</script>
</body>
